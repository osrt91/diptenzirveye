name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://jynyoattfrbwndonerpz.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5bnlvYXR0ZnJid25kb25lcnB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMzgwMzksImV4cCI6MjA4ODgxNDAzOX0.uNdHFdO3I7GetHjFTgl3TGvcFGRiAUcZKWNGsE4e01g
      NEXT_PUBLIC_SITE_URL: https://diptenzirveye.com
      BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run build

      - name: Run E2E tests
        run: |
          npm start &
          npx wait-on http://localhost:3000 --timeout 30000
          npx playwright test --project=chromium
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
